<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ad Blocker Lite</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: rgba(255, 255, 255, 0.06);
      --panel2: rgba(255, 255, 255, 0.10);
      --border: rgba(255, 255, 255, 0.14);
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.70);
      --muted2: rgba(255, 255, 255, 0.55);
      --good: #22c55e;
      --bad: #ef4444;
      --accent: #60a5fa;
      --shadow: 0 14px 40px rgba(0, 0, 0, 0.40);
      --radius: 14px;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f6f7fb;
        --panel: rgba(0, 0, 0, 0.04);
        --panel2: rgba(0, 0, 0, 0.06);
        --border: rgba(0, 0, 0, 0.10);
        --text: rgba(0, 0, 0, 0.86);
        --muted: rgba(0, 0, 0, 0.62);
        --muted2: rgba(0, 0, 0, 0.48);
        --shadow: 0 14px 40px rgba(0, 0, 0, 0.12);
      }
    }

    * { box-sizing: border-box; }

    body {
      width: 320px;
      margin: 0;
      padding: 14px;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 420px at 10% -10%, rgba(96, 165, 250, 0.35), transparent 60%),
        radial-gradient(700px 360px at 110% 10%, rgba(34, 197, 94, 0.22), transparent 60%),
        var(--bg);
    }

    .app {
      padding: 14px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, var(--panel2), var(--panel));
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .logo {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: linear-gradient(135deg, rgba(96,165,250,0.35), rgba(34,197,94,0.20));
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .logo svg { opacity: 0.9; }

    h1 {
      margin: 0;
      font-size: 14px;
      font-weight: 650;
      letter-spacing: 0.2px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .subtitle {
      margin-top: 2px;
      font-size: 12px;
      color: var(--muted2);
    }

    .switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }

    .switch input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .track {
      width: 46px;
      height: 26px;
      background: rgba(148, 163, 184, 0.45);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px;
      transition: background 160ms ease;
      display: flex;
      align-items: center;
    }

    .thumb {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
      transform: translateX(0);
      transition: transform 160ms ease;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    }

    .switch input:checked + .track {
      background: rgba(34, 197, 94, 0.55);
    }

    .switch input:checked + .track .thumb {
      transform: translateX(20px);
    }

    .pill {
      font-size: 12px;
      font-weight: 600;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: rgba(0, 0, 0, 0.08);
      white-space: nowrap;
    }

    .pill.on { color: var(--text); }
    .pill.on { background: rgba(34, 197, 94, 0.20); }
    .pill.off { background: rgba(239, 68, 68, 0.16); }

    .card {
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.06);
      border-radius: 12px;
      padding: 12px;
    }

    .metricRow {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 10px;
    }

    .metricLabel {
      font-size: 12px;
      color: var(--muted2);
    }

    .metricValue {
      font-size: 30px;
      font-weight: 750;
      letter-spacing: 0.3px;
      line-height: 1.0;
      font-variant-numeric: tabular-nums;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 10px;
    }

    .hint {
      font-size: 11px;
      color: var(--muted2);
      line-height: 1.35;
    }

    button {
      font: inherit;
    }

    .btn {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease;
    }

    .btn:hover { background: rgba(255,255,255,0.10); }
    .btn:active { transform: translateY(1px); }

    .footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted2);
      line-height: 1.35;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div class="title">
        <div class="logo" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M12 2l8 4v6c0 5.1-3.4 9.9-8 10-4.6-.1-8-4.9-8-10V6l8-4Z" stroke="currentColor" stroke-width="1.6" opacity="0.9"/>
            <path d="M8.2 12.2l2.4 2.4 5.2-5.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div style="min-width: 0;">
          <h1>Ad Blocker Lite</h1>
          <div class="subtitle">Chặn quảng cáo & tracker</div>
        </div>
      </div>

      <div style="display:flex; flex-direction:column; align-items:flex-end; gap:8px;">
        <span class="pill" id="status">Đang tải…</span>
        <label class="switch" aria-label="Bật/tắt chặn quảng cáo">
          <input type="checkbox" id="enabledSwitch">
          <span class="track" aria-hidden="true"><span class="thumb"></span></span>
        </label>
      </div>
    </div>

    <div class="card">
      <div class="metricRow" aria-live="polite">
        <div>
          <div class="metricLabel">Đã chặn (tổng)</div>
          <div class="metricValue" id="blockedTotal">0</div>
        </div>
        <button type="button" class="btn" id="reset" title="Đặt lại bộ đếm">Reset</button>
      </div>
    </div>

    <div class="footer">
      <div>uBlock filters · EasyList · EasyPrivacy</div>
      <div>PGL · Badware · URLhaus</div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
